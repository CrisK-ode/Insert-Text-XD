<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>AllOne</title>
	<link rel="stylesheet" href="decoracion.css">
</head>
<body>
	<div id="ui">
		<header id="top">
			<div id="info">
				<span id="wave">Oleada: 0</span>
				<span id="level">Nivel: 1</span>
				<span id="hp">Vida: 100</span>
			</div>
			<div id="stats"></div>
		</header>

		<main id="arena">
			<canvas id="game"></canvas>
			<div id="pauseBadge" class="badge hidden">Pausa</div>
		</main>

		<footer id="bottom">
			<div id="xpbar" aria-label="Experiencia">
				<div id="xpfill"></div>
			</div>
			<div id="log">Hora de comenzar</div>
		</footer>
	</div>

	<div id="toastContainer"></div>

	<!-- Controles móviles: joystick izquierdo y zona derecha para apuntar/disparar -->
	<div id="mobileControls">
		<div id="leftStick" class="stick" aria-hidden="true">
			<div class="knob"></div>
		</div>
		<div id="rightPad" class="pad" aria-hidden="true">
			<button id="fireButton">:v</button>
		</div>
	</div>

	<div id="startScreen" class="overlay active">
		<div class="menu">
			<h1>AllOne</h1>
			<p>Puedes moverte con WASD o flechas.<br>
		       Apunta y dispara manteniendo clic.<br>
			   Pausa con P.<br>
				Si estas en boriocel, solo muevete con el Joystick y ataca tocando la pantalla</p>
			<button id="startButton">Comenzar Bodrio</button>
		</div>
	</div>

	<div id="deathScreen" class="overlay hidden">
		<div class="menu">
			<h1>Te han ####### :c</h1>
			<p id="deathText">Que lamentables estadisticas :v</p>
			<button id="retryButton">¿Comenzar de cero?</button>
		</div>
	</div>

	<script src="funcionamiento.js"></script>
</body>
</html>
